<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A2A22" />
            <stop offset="100%" stop-color="#090E0B" />
        </linearGradient>

        <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38EF7D" />
            <stop offset="100%" stop-color="#11998E" />
        </linearGradient>

        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#E2E8F0" />
        </linearGradient>

        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FCEABB" />
            <stop offset="100%" stop-color="#F8B500" />
        </linearGradient>

        <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="40" />
        </filter>
        <filter id="softGlow">
            <feGaussianBlur stdDeviation="8" />
        </filter>
        <filter id="leafShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5" />
        </filter>
        <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
        </filter>
    </defs>

    <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
    
    <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />

    <circle cx="256" cy="270" r="160" fill="#38EF7D" opacity="0.25" filter="url(#glow)" />

    <g filter="url(#leafShadow)">
        <path d="M 256 100 
                 C 360 100, 390 180, 380 250 
                 C 370 320, 280 370, 256 400 
                 C 232 370, 142 320, 132 250 
                 C 122 180, 152 100, 256 100 Z" 
              fill="url(#leafGrad)" />
              
        <g stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.65">
            <path d="M 256 100 L 256 385" stroke-width="3" />
            <path d="M 256 160 Q 300 140 335 145" />
            <path d="M 256 160 Q 212 140 177 145" />
            <path d="M 256 220 Q 310 200 355 210" />
            <path d="M 256 220 Q 202 200 157 210" />
            <path d="M 256 280 Q 300 260 330 280" />
            <path d="M 256 280 Q 212 260 182 280" />
            <path d="M 256 330 Q 280 320 300 340" />
            <path d="M 256 330 Q 232 320 212 340" />
        </g>
    </g>

    <g filter="url(#cloudShadow)">
        <circle cx="156" cy="330" r="80" fill="url(#cloudGrad)" />
        <circle cx="256" cy="290" r="120" fill="url(#cloudGrad)" />
        <circle cx="356" cy="330" r="80" fill="url(#cloudGrad)" />
        <rect x="156" y="290" width="200" height="120" fill="url(#cloudGrad)" />
    </g>

    <g filter="url(#softGlow)" fill="#FFFFFF" opacity="0.6">
        <circle cx="146" cy="310" r="20" />
        <circle cx="236" cy="230" r="30" />
        <circle cx="366" cy="310" r="20" />
    </g>

    <g fill="url(#goldGrad)" opacity="0.9">
        <path d="M 400 120 Q 400 140 420 140 Q 400 140 400 160 Q 400 140 380 140 Q 400 140 400 120 Z" />
        <path d="M 100 190 Q 100 205 115 205 Q 100 205 100 220 Q 100 205 85 205 Q 100 205 100 190 Z" />
        <path d="M 150 110 Q 150 120 160 120 Q 150 120 150 130 Q 150 120 140 120 Q 150 120 150 110 Z" />
        <path d="M 420 350 Q 420 360 430 360 Q 420 360 420 370 Q 420 360 410 360 Q 420 360 420 350 Z" />
    </g>

    <path d="M 0 115 Q 0 0 115 0 L 397 0 Q 512 0 512 115 L 512 256 L 0 256 Z" fill="url(#glossGrad)" />
</svg>
